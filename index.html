<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fil'mPotok — Весь контент в одном месте</title>
    <link rel="stylesheet" href="style.css" />
    <script src="cinema.js" defer></script>
    <link rel="icon" href="favico.ico" type="image/png" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🎬Fil'mPotok</h1>
        <p>Фильмы, сериалы, мультфильмы и аниме</p>
        <div class="search-box">
          <input
            type="text"
            id="movieInput"
            placeholder="Введите название (Наруто, Мстители, Мадагаскар)..."
          />
          <button id="addBtn">Найти и добавить</button>
        </div>
      </header>

      <main>
        <div id="myMoviesGrid" class="my-movies-grid"></div>
      </main>
    </div>

    <div id="playerModal" class="modal">
      <div class="modal-content">
        <span class="close-modal" onclick="closePlayer()">&times; Закрыть</span>
        <h3 id="modalTitle">Загрузка...</h3>

        <div class="player-controls">
          <div class="source-group">
            <button class="q-btn active" id="src1" onclick="changeSource(1)">
              Сервер 1
            </button>
            <button class="q-btn" id="src2" onclick="changeSource(2)">
              Сервер 2
            </button>
            <button id="openNewTab" class="q-btn ext-link">
              ↗ В новом окне
            </button>
          </div>

          <div class="episode-controls" id="epControls">
            <button class="nav-btn" onclick="changeEpisode(-1)">⬅ Пред.</button>
            <div class="episode-info">
              Серия <span id="currentEpisodeDisplay">1</span>
            </div>
            <button class="nav-btn" onclick="changeEpisode(1)">След. ➡</button>
          </div>
        </div>

        <div class="video-wrapper">
          <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        </div>

        <div class="source-links">
          <span>Если плеер не работает, попробуйте на сайтах:</span>
          <div id="externalButtons"></div>
        </div>
      </div>
    </div>
  </body>
</html>
